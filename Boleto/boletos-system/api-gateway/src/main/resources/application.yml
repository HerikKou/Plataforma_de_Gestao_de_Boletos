server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: boleto-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/boletos/**
        - id: vencimento-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/vencimentos/**
        - id: notificacao-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notificacoes/**
        - id: pagamento-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/pagamentos/**
