<!DOCTYPE html>

<head><meta charset="UTF-8"><title>Notificacao Boleto</title></head>
<body>
  <h2>Notificacao de Boleto</h2>

  <p><strong>Vencimento:</strong> <span th:text="${event.dataVencimento}"></span></p>

</body>
</html>
