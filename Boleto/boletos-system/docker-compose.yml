version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-boleto:
    image: postgres:15
    environment:
      POSTGRES_DB: boletoservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]

  postgres-vencimento:
    image: postgres:15
    environment:
      POSTGRES_DB: vencimentoservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]

  postgres-notificacao:
    image: postgres:15
    environment:
      POSTGRES_DB: notificacaoservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]

  postgres-pagamento:
    image: postgres:15
    environment:
      POSTGRES_DB: pagamentoservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    depends_on: [kafka]

  boleto-service:
    build: ./boleto-service
    ports: ["8081:8081"]
    depends_on: [kafka, postgres-boleto]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-boleto:5432/boletoservice
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  vencimento-service:
    build: ./vencimento-service
    ports: ["8082:8082"]
    depends_on: [kafka, postgres-vencimento]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vencimento:5432/vencimentoservice
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notificacao-service:
    build: ./notificacao-service
    ports: ["8083:8083"]
    depends_on: [kafka, postgres-notificacao]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notificacao:5432/notificacaoservice
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  pagamento-service:
    build: ./pagamento-service
    ports: ["8084:8084"]
    depends_on: [kafka, postgres-pagamento]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-pagamento:5432/pagamentoservice
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
